<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar User Masuk</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="img/logo.avif" type="image/x-icon" class="icon">
</head>
<body>
  <!-- Stars -->
  <div class="stars" id="stars"></div>

  <!-- Moon -->
  <div class="moon">
    <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="moonGrad" cx="40%" cy="35%">
          <stop offset="0%" stop-color="#fff9c4"/>
          <stop offset="100%" stop-color="#d4a017"/>
        </radialGradient>
      </defs>
      <circle cx="40" cy="40" r="30" fill="url(#moonGrad)"/>
      <circle cx="55" cy="28" r="24" fill="#0d3b1e"/>
    </svg>
  </div>

  <div class="stage">
    <div class="title">Daftar User Masuk</div>
    <div class="subtitle">Hanya untuk admin</div>

    <div class="admin-actions">
      <a class="btn-link" href="dashboard.html">Kembali</a>
    </div>

    <div id="userEntriesList" class="user-list" aria-live="polite"></div>
  </div>

  <script src="audio.js"></script>
  <script src="script.js"></script>
</body>
</html>
